name = "2fa"
main = "src/worker.js"
compatibility_date = "2024-01-13"
workers_dev = true
preview_urls = false

# KV 命名空间
# 部署时由 scripts/deploy.js 自动查找或创建，无需手动配置
# 本地开发如需指定 ID，可取消注释下方三行
# [[kv_namespaces]]
# binding = "SECRETS_KV"
# id = "your-kv-namespace-id"
# preview_id = "your-preview-kv-namespace-id"

# 环境变量 (Secrets)
# 注意：敏感信息使用 Cloudflare Secrets 安全存储
#
# 生产环境（默认）设置：
#   npx wrangler secret put ENCRYPTION_KEY    # 加密密钥（可选，用于数据加密）
#
# 开发环境设置：
#   npx wrangler secret put ENCRYPTION_KEY --env development
#
# 详细配置指南：docs/DEPLOYMENT.md

# 定时任务配置 - 每天凌晨0点（北京时间）自动备份（仅在数据变化时执行）
[triggers]
crons = ["0 16 * * *"]

# ====================================
# 🚀 Service Worker 自动版本管理
# ====================================
# SW_VERSION 将在部署时通过 scripts/generate-version.js 自动生成
# 支持三种版本策略：
#   - 时间戳（默认）：v20250102-123456
#   - Git commit：v<short-hash>
#   - Package版本：v1.0.0
#
# 使用方式：
#   npm run deploy              # 使用时间戳版本
#   npm run deploy:git          # 使用 git commit 版本
#   npm run deploy:package      # 使用 package.json 版本
#
# 注意：版本号由部署脚本注入，此处的值仅用于本地开发
[vars]
SW_VERSION = "v1"
REQUIRE_ENCRYPTION = "true"
ALLOW_LEGACY_OTP_PATH = "false"
BACKUP_MAX_BACKUPS = "20"
AUTH_SESSION_TTL_MINUTES = "30"
AUTH_AUTO_REFRESH_THRESHOLD_MINUTES = "10"
AUTH_ABSOLUTE_TTL_MINUTES = "180"
AUTH_IDLE_TIMEOUT_MINUTES = "5"

# ====================================
# 开发/测试环境配置
# ====================================
[env.development]
name = "2fa-dev"

[env.development.vars]
REQUIRE_ENCRYPTION = "false"
ALLOW_LEGACY_OTP_PATH = "true"
BACKUP_MAX_BACKUPS = "20"
AUTH_SESSION_TTL_MINUTES = "480"
AUTH_AUTO_REFRESH_THRESHOLD_MINUTES = "60"
AUTH_ABSOLUTE_TTL_MINUTES = "1440"
AUTH_IDLE_TIMEOUT_MINUTES = "240"

# [[env.development.kv_namespaces]]
# binding = "SECRETS_KV"
# id = "your-dev-kv-namespace-id"
